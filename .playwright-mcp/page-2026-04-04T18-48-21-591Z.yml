              - listitem [ref=e310]:
                - paragraph [ref=e311]:
                  - strong [ref=e312]: "Recommended Hosting Architecture on Azure:"
                - list [ref=e313]:
                  - listitem [ref=e314]: I'd suggest an Azure Static Web App. This is perfect for dashboards because it handles the front-end (what users see) efficiently. You could use a modern web framework like React or Vue.js to build the dashboard itself.
                  - listitem [ref=e315]: For the data, we'd likely use an Azure Function App acting as an API. This function would securely connect to your team's existing data sources (e.g., project management tools, Excel files, databases) to pull the capacity information. It's serverless, meaning it only runs when requested, which is very cost-effective.
                  - listitem [ref=e316]: This setup would be internal-only, accessible via ENMAX's internal network or VPN, ensuring data security.
              - listitem [ref=e317]:
                - paragraph [ref=e318]:
