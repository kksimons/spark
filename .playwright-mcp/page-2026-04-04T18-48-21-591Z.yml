                  - listitem [ref=e321]:
                    - text: Very low, likely
                    - strong [ref=e322]: $10 - $50 per month
                    - text: . Static Web Apps and Function Apps are incredibly cost-efficient, especially for internal tools with predictable usage. The main costs would come from data storage or any specific database connections.
              - listitem [ref=e323]:
                - paragraph [ref=e324]:
                  - strong [ref=e325]: "Accessibility Requirements:"
