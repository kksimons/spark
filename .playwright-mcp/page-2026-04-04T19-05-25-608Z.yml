                  - paragraph [ref=e521]:
                    - strong [ref=e522]: "Recommended Hosting Architecture on Azure:"
                    - text: For a dashboard displaying internal team capacity, an Azure Static Web App is an excellent choice. This would host your front-end (the dashboard itself, built with a modern web framework) and can easily integrate with Azure Functions for any backend logic or data retrieval. This keeps things simple and cost-effective.
                - listitem [ref=e523]:
                  - paragraph [ref=e524]:
                    - strong [ref=e525]: "Estimated Monthly Infrastructure Cost Range:"
                    - text: For a Static Web App with a few Azure Functions, your monthly costs would likely be in the
                    - strong [ref=e526]: $10 - $50 range
                    - text: . This is very low, as Static Web Apps have a generous free tier, and Functions are charged based on execution and memory, which for internal use would be minimal.
                - listitem [ref=e527]:
                  - paragraph [ref=e528]:
                    - strong [ref=e529]: "Accessibility Requirements:"
                    - text: Since this is an internal tool, the primary users are ENMAX employees. While not legally mandated for WCAG 2.1 AA like public-facing sites, it's still best practice to aim for good accessibility. This ensures everyone, including those with disabilities, can easily use the dashboard. Focus on clear navigation, readable fonts, and keyboard operability.
                - listitem [ref=e530]:
                  - paragraph [ref=e531]:
                    - strong [ref=e532]: "Deployment Strategy and Environments Needed:"
                    - text: "We'd set up a CI/CD pipeline using Azure DevOps. This would automatically build and deploy your dashboard whenever changes are committed to a code repository. We'd need at least two environments:"
